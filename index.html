<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Как ИИ усиливает QA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="deck" aria-live="polite">
      <header class="topbar">
        <div class="brand">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="brand-title">QA × AI</span>
        </div>
        <div class="topbar-right">
          <span class="hint">← → • Space</span>
        </div>
      </header>

      <section id="slide" class="slide" role="group" aria-roledescription="slide"></section>

      <footer class="footer">
        <a class="nav nav-prev" href="#" aria-label="Предыдущий слайд">← Назад</a>
        <div class="counter" aria-label="Счётчик слайдов">
          <span id="counter-current">1</span>
          <span class="counter-sep">/</span>
          <span id="counter-total">1</span>
        </div>
        <a class="nav nav-next" href="#" aria-label="Следующий слайд">Далее →</a>
      </footer>
    </main>

    <script src="./slides.js"></script>
  </body>
</html>
